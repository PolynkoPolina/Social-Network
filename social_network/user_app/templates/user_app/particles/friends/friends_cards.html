{% load static %}

{% for user in users %}
    <div class="friends-card">
        <div class="top">
            <img src="{% static 'icons/sidebar-avatar.svg' %}" alt="">
            <h3>{{user.username}}</h3>
            <p>{{user.email}}</p>
        </div>
        <div class = "buttons">
            <button class="button" type="button">Підтвердити</button>
            <button class=" button cancel-btn" type="button">Відхилити</button>
        </div>
    </div>
{% empty %}

{% endfor %}
