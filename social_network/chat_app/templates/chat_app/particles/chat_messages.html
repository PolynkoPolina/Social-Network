{% load static %}


<section class = "sidebar-messages">
    <div class = "sidebar-messages-top">
        <div>
            <img src="{% static 'icons/grey_chat.svg' %}" alt="">
            <p>Повідомлення</p>
        </div>
    </div>
    <div class = "chat-block">
        {% for chat in personal_chats %}
            {% for person in chat.users.all %}
                {% if person.id != request.user.id %}
                    <button type="button" class="chat-user-button group-div" data-chat-user="{{ person.id }}" data-chat-username="{{ person.username }}">
                        <div class = "user">
                            <img src="{% static 'icons/friends_icon3.svg' %}" alt="" class = 'user-avatar'>
                            <div class = "user-info">
                                <div>
                                    <h4>{{ person.username }}</h4>
                                    <p class="latest-message" data-message-text = "{% for message in chat.messages.all %}{{ message.text }},{% endfor %}"></p>
                                </div> 
                                <span class="latest-message-time" data-message-time="{% for message in chat.messages.all %}{{ message.created_at }},{% endfor %}"></span>
                            </div>
                        </div>
                    </button>
                {% endif %}
            {% endfor %}
        {% empty %}
        {% endfor %}
    </div>
    
</section>
